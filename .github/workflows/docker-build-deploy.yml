name: Docker Release

on:
  workflow_call:
    inputs:
      version:
        description: "Inspector package version"
        required: true
        type: string
      push:
        description: "Push images to Docker Hub"
        required: false
        default: true
        type: boolean
      apply_release_patch:
        description: "Apply the shared release patch artifact before building"
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: "Inspector package version"
        required: false
        type: string
      push:
        description: "Push images to Docker Hub"
        required: false
        default: false
        type: boolean
      apply_release_patch:
        description: "Apply release patch artifact from the current run"
        required: false
        default: false
        type: boolean

env:
  DOCKER_REPOSITORY: mcpjam/mcp-inspector

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_VERSION: ${{ inputs.version != '' && inputs.version || format('sha-{0}', github.sha) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release patch
        if: inputs.apply_release_patch
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .release-plan

      - name: Apply release patch
        if: inputs.apply_release_patch
        run: git apply --binary .release-plan/release.patch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: inputs.push
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REPOSITORY }}
          tags: |
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=raw,value=latest,enable=${{ inputs.push && inputs.version != '' }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./mcpjam-inspector/Dockerfile
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKER_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REPOSITORY }}:buildcache,mode=max
