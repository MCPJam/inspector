name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: inspector-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_APP_URL || 'https://staging.mcpjam.com' }}
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_INSPECTOR_SERVICE: ${{ vars.RAILWAY_INSPECTOR_SERVICE }}
      RAILWAY_STAGING_ENVIRONMENT: ${{ vars.RAILWAY_STAGING_ENVIRONMENT }}
      STAGING_APP_URL: ${{ vars.STAGING_APP_URL || 'https://staging.mcpjam.com' }}
    steps:
      - name: Enforce main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "deploy-staging.yml must run from main" >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies and format
        working-directory: mcpjam-inspector
        run: |
          npm ci
          npm run prettier-fix

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.57.1

      # Lock in the cross-origin allowlists that the staging sandbox needs.
      # `sandbox-staging.mcpjam.com` is served by this same Railway service
      # via a host subdomain; its frame-ancestors CSP is built from
      # `WEB_ALLOWED_ORIGINS` (see `buildFrameAncestors()` in
      # `server/routes/web/apps.ts`). Without the `mcp-inspector-pr-*`
      # wildcard, PR previews hosted on Railway can't iframe the staging
      # sandbox proxy and MCP Apps render blank inside the preview.
      #
      # `*` literal in `WEB_ALLOWED_ORIGINS` is safe for CORS — Hono's CORS
      # middleware does a literal `Array.includes(origin)` against the
      # request Origin header, so a wildcard entry never matches a real
      # origin and CORS stays unchanged. The wildcard reaches the
      # browser-parsed frame-ancestors directive, which DOES support `*`.
      # `ALLOWED_ORIGINS` (origin-validation middleware) supports the
      # wildcard via `matchesAllowedOrigin`, gated on
      # `MCPJAM_NONPROD_LOCKDOWN=true` — staging satisfies that.
      - name: Refresh staging origin allowlists
        run: |
          .github/scripts/railway-retry.sh .github/scripts/railway-set-vars.sh \
            -e "$RAILWAY_STAGING_ENVIRONMENT" \
            -s "$RAILWAY_INSPECTOR_SERVICE" \
            ALLOWED_ORIGINS="$STAGING_APP_URL,https://mcp-inspector-pr-*.up.railway.app" \
            WEB_ALLOWED_ORIGINS="$STAGING_APP_URL,https://mcp-inspector-pr-*.up.railway.app"

      # Capture the most recent deployment id before we trigger a new one so
      # the wait step below can detect when *our* deploy appears (instead of
      # racing on the previous-good deploy's status).
      - name: Snapshot latest deployment id
        id: previous_deploy
        run: |
          PREV=$(.github/scripts/railway-retry.sh railway deployment list \
            --service "$RAILWAY_INSPECTOR_SERVICE" \
            --environment "$RAILWAY_STAGING_ENVIRONMENT" \
            --limit 1 \
            --json | jq -r '.[0].id // empty')
          echo "id=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous deployment: ${PREV:-<none>}"

      # `--detach` uploads and returns immediately. The `--ci` log-stream
      # mode regularly times out against backboard.railway.com even though
      # the deploy itself succeeds; that mismatch was failing the workflow
      # while staging was getting updated correctly. We poll status below
      # instead of relying on the streaming connection.
      - name: Deploy inspector to Railway staging
        run: |
          .github/scripts/railway-retry.sh railway up \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_STAGING_ENVIRONMENT" \
            --service "$RAILWAY_INSPECTOR_SERVICE"

      # We can't reliably capture the deployment id railway up creates, and
      # railway-retry.sh may have triggered duplicate deploys (if a Railway
      # API blip dropped an otherwise-successful upload response). Strategy:
      # poll the topmost deployment. If it differs from the pre-upload
      # snapshot, treat it as ours and wait for terminal status. If a newer
      # deploy supersedes it mid-wait (retry duplicate), follow the new top.
      - name: Wait for Railway staging deploy to finish
        timeout-minutes: 20
        env:
          PREVIOUS_DEPLOY_ID: ${{ steps.previous_deploy.outputs.id }}
        run: |
          set -uo pipefail
          while :; do
            ROW=$(.github/scripts/railway-retry.sh railway deployment list \
              --service "$RAILWAY_INSPECTOR_SERVICE" \
              --environment "$RAILWAY_STAGING_ENVIRONMENT" \
              --limit 1 \
              --json | jq -r '.[0] | "\(.id // "")\t\(.status // "")"')
            ID="${ROW%%	*}"
            STATUS="${ROW##*	}"
            if [ -z "$ID" ] || [ "$ID" = "$PREVIOUS_DEPLOY_ID" ]; then
              echo "Waiting for new deployment to appear (latest=${ID:-none}, prev=$PREVIOUS_DEPLOY_ID)"
              sleep 10
              continue
            fi
            case "$STATUS" in
              SUCCESS)
                echo "Deploy $ID succeeded"
                exit 0
                ;;
              FAILED|CRASHED)
                echo "::error::Deploy $ID ended in status $STATUS"
                exit 1
                ;;
              "")
                echo "Status not readable yet for $ID"
                ;;
              *)
                echo "Deploy $ID status: $STATUS"
                ;;
            esac
            sleep 15
          done

  smoke:
    needs: deploy
    uses: ./.github/workflows/post-deploy-staging.yml
