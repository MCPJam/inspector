name: Windows Release

on:
  workflow_call:
    inputs:
      version:
        description: "Release version label"
        required: true
        type: string
      apply_release_patch:
        description: "Apply the shared release patch artifact before building"
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version label"
        required: false
        type: string
      apply_release_patch:
        description: "Apply release patch artifact from the current run"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  make-windows:
    runs-on: windows-latest
    env:
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      ARTIFACT_VERSION: ${{ inputs.version != '' && inputs.version || github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release patch
        if: inputs.apply_release_patch == true
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: .release-plan

      - name: Apply release patch
        if: inputs.apply_release_patch == true
        run: git apply --binary .release-plan/release.patch
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        shell: powershell

      - name: Rebuild native modules for Windows
        run: npm rebuild esbuild --verbose
        shell: powershell

      - name: Restore code signing cert
        if: env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:WINDOWS_PFX_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\\codesign.pfx", $bytes)

      - name: Build app
        run: npm run build -w @mcpjam/inspector
        shell: powershell

      - name: Make Windows installer
        env:
          WINDOWS_PFX_FILE: ${{ runner.temp }}\\codesign.pfx
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: npm run electron:make -w @mcpjam/inspector
        shell: powershell

      - name: Rename installer to consistent name
        run: |
          $setupFile = Get-ChildItem -Path "mcpjam-inspector\\out\\make" -Recurse -Name "*Setup.exe" | Select-Object -First 1
          if ($setupFile) {
            Copy-Item "mcpjam-inspector\\out\\make\\$setupFile" "$env:GITHUB_WORKSPACE\\MCPJam-Inspector-Setup.exe"
            echo "SETUP_PATH=$env:GITHUB_WORKSPACE/MCPJam-Inspector-Setup.exe" >> $env:GITHUB_ENV
          }
        shell: powershell

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inspector-windows-${{ env.ARTIFACT_VERSION }}
          path: |
            ${{ env.SETUP_PATH }}
            mcpjam-inspector\out\make\**\RELEASES
            mcpjam-inspector\out\make\**\*.nupkg
          retention-days: 14
