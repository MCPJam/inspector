name: PR MCP Preview

# Per-PR preview URLs for the MCP Cloudflare Worker.
#
# Every push to a PR that touches mcp/ uploads a new *version* of the
# staging Worker via `wrangler versions upload --env staging`. Cloudflare
# returns a unique preview URL per upload (shape:
# https://<version-id>-mcpjam-mcp-staging.<subdomain>.workers.dev) that
# routes to that specific version without promoting it. Concurrent PRs
# don't collide, and no cleanup is needed — version-upload URLs age out
# per Cloudflare's retention.
#
# The live `mcpjam-mcp-staging` worker still only changes on merge to
# main, via .github/workflows/deploy-mcp-staging.yml.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    paths:
      - "mcp/**"
      - ".github/workflows/pr-mcp-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Per-PR group with cancel-in-progress. Semantics worth knowing:
  #   - Two rapid pushes on the same PR: the older upload is cancelled so
  #     the comment always reflects the newest SHA.
  #   - Close mid-upload: the in-flight upsert is cancelled and
  #     destroy-mcp-preview runs — correct, no point finishing a version
  #     upload for a just-closed PR.
  #   - Close+reopen in quick succession can race the comment state
  #     (destroy wins, then upsert overwrites). Acceptable; reviewers will
  #     see the live URL once the second upload completes.
  group: mcp-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_COMMENT_MARKER: "<!-- mcpjam-mcp-preview -->"
  NODE_VERSION: "24.14.0"

jobs:
  upsert-mcp-preview:
    # Same fork-PR exclusion as pr-preview.yml — external PRs don't get
    # access to Cloudflare secrets.
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deliberately no `environment:` declaration — we don't want to create a
    # `mcp-preview-pr-<n>` environment per PR (clutters the Environments
    # list), and we don't want PR-preview deployments to show up in
    # `mcp-staging`'s deployment history (would confuse Soundcheck's
    # deploy-diff tile). Secrets are read from repo level; the per-PR URL
    # is surfaced via the PR comment, which is where reviewers look anyway.
    steps:
      - name: Require Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub Actions secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck MCP worker
        run: npm run typecheck -w @mcpjam/mcp

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: "mcp"
          command: versions upload --env staging --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"

      - name: Smoke test preview URL
        env:
          DEPLOYMENT_URL: ${{ steps.preview.outputs.deployment-url }}
        run: |
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Wrangler action did not return a deployment URL." >&2
            exit 1
          fi
          curl --fail --silent --show-error "$DEPLOYMENT_URL" | grep -q "MCPJam MCP"

      - name: Upsert PR preview comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.deployment-url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = process.env.PREVIEW_COMMENT_MARKER;
            const previewUrl = process.env.PREVIEW_URL;
            const headSha = process.env.HEAD_SHA;
            const shortSha = headSha ? headSha.slice(0, 7) : "unknown";
            const issue_number = context.payload.pull_request.number;

            const bodyLines = [
              marker,
              "### MCP worker preview",
              previewUrl
                ? `Preview URL: ${previewUrl}`
                : "Preview URL will appear after the version upload finishes.",
              previewUrl ? `MCP endpoint: ${previewUrl.replace(/\/$/, "")}/mcp` : "",
              `Built from \`${shortSha}\`. Each push uploads a new version — older URLs keep working until Cloudflare expires them.`,
              "The live `mcpjam-mcp-staging` worker only changes on merge to `main`.",
            ].filter(Boolean);
            const body = bodyLines.join("\n");

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page: 100,
              }
            );
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });

      - name: Summarize MCP preview
        env:
          DEPLOYMENT_URL: ${{ steps.preview.outputs.deployment-url }}
        run: |
          echo "## ✅ MCP preview uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker: \`mcpjam-mcp-staging\` (version upload — does not promote)" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: \`$DEPLOYMENT_URL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- MCP endpoint: \`${DEPLOYMENT_URL%/}/mcp\`" >> "$GITHUB_STEP_SUMMARY"

  destroy-mcp-preview:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mark preview comment as expired
        uses: actions/github-script@v7
        with:
          script: |
            const marker = process.env.PREVIEW_COMMENT_MARKER;
            const issue_number = context.payload.pull_request.number;
            // Cloudflare version uploads self-expire per account retention —
            // no explicit cleanup API call is needed here. We just update
            // the PR comment so reviewers don't follow a stale URL.
            const body = [
              marker,
              "### MCP worker preview",
              "PR closed. Preview URLs will stop working once Cloudflare expires their versions.",
              "Merged changes go live on `mcpjam-mcp-staging` via `deploy-mcp-staging.yml`.",
            ].join("\n");

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page: 100,
              }
            );
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
